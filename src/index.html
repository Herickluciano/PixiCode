<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>luhamCode - Agence de Marketing Digital & Stratégie Web</title>
  
  <meta name="description" content="luhamCode est une agence de marketing digital spécialisée en stratégie web, SEO, publicité en ligne et réseaux sociaux.">
  <meta name="keywords" content="luhamCode, marketing digital, agence SEO, stratégie web, publicité en ligne">
  <meta name="author" content="luhamCode">

  <!-- Favicon -->
  <link rel="icon" href="images/luhamcode.jpg" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100..900&family=Roboto+Flex:opsz,wght@8..144,100..1000&family=Roboto+Mono:wght@100..700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <!-- CSS Bootstrap (Un seul import suffit) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="luhamCode - Agence de Marketing Digital">
  <meta property="og:description" content="Boostez votre visibilité avec une stratégie digitale sur mesure.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.luhamcode.com/">
  <meta property="og:image" content="https://www.luhamcode.com/images/og-image.jpg">
</head>

<body>
  <!-- L'application Angular s'injecte ici -->
  <app-root></app-root>

  <!-- JS Bootstrap (chargé après le HTML pour la performance) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Scripts globaux (Scroll to top) -->
  <script>
    window.onscroll = () => toggleTopButton();
    
    function scrollToTop(){
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleTopButton() {
      const btn = document.getElementById('back-to-up');
      if (btn) {
        if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
          btn.classList.remove('d-none');
        } else {
          btn.classList.add('d-none');
        }
      }
    }
  </script>
</body>
</html>
